<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Glossary - Learn Terms Simply</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #f5f1ed;
            --warm-beige: #e8dfd8;
            --sage: #8b9e7a;
            --terracotta: #c7845a;
            --muted-blue: #7a8b9e;
            --dark-text: #3d3d3a;
            --light-text: #6b6b68;
            --border-light: #d9cfc6;
            --accent-warm: #d4a574;
        }

        body {
            font-family: 'Lora', serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--warm-beige) 100%);
            background-attachment: fixed;
            color: var(--dark-text);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        /* Subtle linen texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 158, 122, 0.02) 2px,
                    rgba(139, 158, 122, 0.02) 4px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 158, 122, 0.02) 2px,
                    rgba(139, 158, 122, 0.02) 4px
                );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.7s ease-out;
        }

        .header-content h1 {
            font-family: 'Crimson Text', serif;
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -2px;
            color: var(--dark-text);
            margin-bottom: 8px;
            font-style: italic;
        }

        .header-divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, var(--sage), var(--terracotta));
            margin: 20px auto;
            border-radius: 1px;
        }

        .header-content p {
            font-size: 1.05rem;
            color: var(--light-text);
            font-style: italic;
            letter-spacing: 0.3px;
            font-weight: 400;
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
            animation: slideUp 0.7s ease-out 0.1s both;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-light);
            border-radius: 2px;
            font-size: 1rem;
            font-family: 'Lora', serif;
            background: rgba(255, 255, 255, 0.8);
            color: var(--dark-text);
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--light-text);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--sage);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px rgba(139, 158, 122, 0.08);
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        .view-toggle-btn {
            flex: 1;
            padding: 16px 24px;
            border: 2px solid var(--border-light);
            border-radius: 2px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lora', serif;
            letter-spacing: 0.3px;
            background: rgba(255, 255, 255, 0.7);
            color: var(--dark-text);
            position: relative;
            overflow: hidden;
        }

        .view-toggle-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(139, 158, 122, 0.1);
            transition: left 0.3s ease;
        }

        .view-toggle-btn:hover::before {
            left: 100%;
        }

        .view-toggle-btn:hover {
            border-color: var(--sage);
            box-shadow: 0 4px 12px rgba(139, 158, 122, 0.15);
        }

        .view-toggle-btn.active {
            background: var(--sage);
            color: white;
            border-color: var(--sage);
        }

        .form-section {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            padding: 50px 45px;
            border-radius: 2px;
            box-shadow: 
                0 8px 32px rgba(61, 61, 58, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            margin-top: 50px;
            margin-bottom: 0;
            animation: slideUp 0.7s ease-out 0.2s both;
            border: 1px solid var(--border-light);
            position: relative;
        }

        .form-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 20px,
                    rgba(199, 132, 90, 0.01) 20px,
                    rgba(199, 132, 90, 0.01) 40px
                );
            pointer-events: none;
            border-radius: 2px;
        }

        .form-content {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group:last-of-type {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--dark-text);
            letter-spacing: 0.4px;
            font-family: 'Lora', serif;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-light);
            border-radius: 2px;
            font-family: 'Lora', serif;
            font-size: 1rem;
            color: var(--dark-text);
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.6);
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: var(--light-text);
            opacity: 0.7;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--sage);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px rgba(139, 158, 122, 0.08);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.7;
        }

        .form-actions {
            display: flex;
            gap: 14px;
            margin-top: 32px;
        }

        button[type="submit"],
        button[type="reset"] {
            padding: 14px 32px;
            border: 1px solid var(--border-light);
            border-radius: 2px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lora', serif;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]::before,
        button[type="reset"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(139, 158, 122, 0.1);
            transition: left 0.3s ease;
        }

        button[type="submit"]:hover::before,
        button[type="reset"]:hover::before {
            left: 100%;
        }

        button[type="submit"] {
            background: var(--sage);
            color: white;
            border-color: var(--sage);
            flex: 1;
        }

        button[type="submit"]:hover {
            box-shadow: 0 8px 20px rgba(139, 158, 122, 0.25);
            transform: translateY(-2px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="reset"] {
            background: rgba(212, 165, 116, 0.15);
            color: var(--accent-warm);
            border-color: var(--accent-warm);
            flex: 1;
        }

        button[type="reset"]:hover {
            background: rgba(212, 165, 116, 0.25);
        }

        .glossary-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
            animation: slideUp 0.7s ease-out 0.2s both;
        }

        .glossary-item {
            background: rgba(255, 255, 255, 0.7);
            padding: 32px;
            border-radius: 2px;
            border-left: 5px solid var(--sage);
            box-shadow: 
                0 4px 16px rgba(61, 61, 58, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: itemPop 0.5s ease-out;
            border: 1px solid var(--border-light);
            border-left: 5px solid var(--sage);
            position: relative;
            overflow: hidden;
        }

        .glossary-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 158, 122, 0.01) 2px,
                    rgba(139, 158, 122, 0.01) 4px
                );
            pointer-events: none;
        }

        .glossary-item:nth-child(2n) {
            border-left-color: var(--terracotta);
        }

        .glossary-item:nth-child(3n) {
            border-left-color: var(--muted-blue);
        }

        .glossary-item:hover {
            box-shadow: 
                0 12px 32px rgba(61, 61, 58, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transform: translateY(-6px);
        }

        @keyframes itemPop {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .term-title {
            font-family: 'Crimson Text', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--dark-text);
            margin-bottom: 14px;
            word-break: break-word;
            position: relative;
            z-index: 1;
        }

        .term-meaning {
            font-size: 1rem;
            line-height: 1.75;
            color: var(--light-text);
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .term-actions {
            display: flex;
            gap: 8px;
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border-light);
            position: relative;
            z-index: 1;
        }

        .btn-delete {
            background: rgba(212, 165, 116, 0.15);
            color: var(--terracotta);
            padding: 10px 16px;
            font-size: 0.85rem;
            flex: 1;
            border-radius: 2px;
            border: 1px solid rgba(212, 165, 116, 0.3);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lora', serif;
        }

        .btn-delete:hover {
            background: rgba(212, 165, 116, 0.25);
            border-color: var(--accent-warm);
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            animation: slideUp 0.7s ease-out 0.2s both;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 24px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 1.2rem;
            color: var(--light-text);
            font-style: italic;
        }

        .stats {
            text-align: center;
            font-size: 0.95rem;
            color: var(--light-text);
            margin-bottom: 30px;
            letter-spacing: 0.3px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header-content h1 {
                font-size: 2.5rem;
            }

            .controls-section {
                flex-direction: column;
            }

            .button-group {
                flex-direction: column;
                width: 100%;
            }

            .view-toggle-btn {
                width: 100%;
            }

            .form-section {
                padding: 35px 25px;
            }

            .glossary-list {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            button[type="submit"],
            button[type="reset"] {
                width: 100%;
            }

            body {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Simple Glossary</h1>
                <div class="header-divider"></div>
                <p>Learn terms in plain language, without the confusion</p>
            </div>
        </header>

        <div class="controls-section">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="Search terms... (try typing 'api' or 'deployment')"
            >
            <div class="button-group">
                <button class="view-toggle-btn active" id="searchModeBtn" onclick="setMode('search')">Search</button>
                <button class="view-toggle-btn" id="viewAllBtn" onclick="setMode('viewAll')">View All</button>
            </div>
        </div>

        <div id="glossaryContainer"></div>
        <div class="stats">
            <span id="stats">No terms yet. Add them in the form below!</span>
        </div>

        <div class="form-section">
            <div class="form-content">
                <form id="glossaryForm">
                    <div class="form-group">
                        <label for="termInput">Term or Concept</label>
                        <input 
                            type="text" 
                            id="termInput" 
                            placeholder="e.g., Repository, API, Deployment"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="meaningInput">What Does It Mean? (In Simple Language)</label>
                        <textarea 
                            id="meaningInput"
                            placeholder="Write like you're explaining it to a friend who has zero background. Quick, direct, no unnecessary words. Example: 'A folder where all your code files live. Tracks every change you make.'"
                            required
                        ></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit">Add to Glossary</button>
                        <button type="reset">Clear</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('glossaryForm');
        const termInput = document.getElementById('termInput');
        const meaningInput = document.getElementById('meaningInput');
        const searchInput = document.getElementById('searchInput');
        const container = document.getElementById('glossaryContainer');
        const stats = document.getElementById('stats');
        const searchModeBtn = document.getElementById('searchModeBtn');
        const viewAllBtn = document.getElementById('viewAllBtn');

        const STORAGE_KEY = 'simpleGlossary';
        let currentMode = 'search'; // 'search' or 'viewAll'

        function loadTerms() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveTerms(terms) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(terms));
        }

        function setMode(mode) {
            currentMode = mode;
            
            // Update button states
            if (mode === 'search') {
                searchModeBtn.classList.add('active');
                viewAllBtn.classList.remove('active');
            } else {
                searchModeBtn.classList.remove('active');
                viewAllBtn.classList.add('active');
            }
            
            // Re-render with new mode
            renderTerms(searchInput.value);
        }

        function renderTerms(filter = '') {
            const terms = loadTerms();
            let termsToDisplay = [];

            if (currentMode === 'viewAll') {
                // Sort alphabetically
                termsToDisplay = [...terms].sort((a, b) => 
                    a.term.toLowerCase().localeCompare(b.term.toLowerCase())
                );
            } else {
                // Search mode - just use original order
                termsToDisplay = terms;
            }

            // Apply filter if searching
            const filtered = termsToDisplay.filter(t => 
                t.term.toLowerCase().includes(filter.toLowerCase()) ||
                t.meaning.toLowerCase().includes(filter.toLowerCase())
            );

            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <div class="empty-state-text">
                            ${terms.length === 0 
                                ? "No terms yet. Add them in the form below!" 
                                : currentMode === 'viewAll'
                                ? "No matching terms found in the glossary."
                                : "No matching terms found. Try a different search."}
                        </div>
                    </div>
                `;
            } else {
                const html = filtered.map((term, index) => `
                    <div class="glossary-item">
                        <div class="term-title">${escapeHtml(term.term)}</div>
                        <div class="term-meaning">${escapeHtml(term.meaning)}</div>
                        <div class="term-actions">
                            <button class="btn-delete" onclick="deleteTerm('${escapeHtml(term.term)}')">
                                Delete
                            </button>
                        </div>
                    </div>
                `).join('');
                container.innerHTML = html;
            }

            stats.textContent = `${filtered.length} ${filtered.length === 1 ? 'term' : 'terms'} found`;
        }

        function deleteTerm(termName) {
            if (confirm(`Are you sure you want to delete "${termName}"?`)) {
                let terms = loadTerms();
                terms = terms.filter(t => t.term !== termName);
                saveTerms(terms);
                renderTerms(searchInput.value);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const term = termInput.value.trim();
            const meaning = meaningInput.value.trim();

            if (term && meaning) {
                const terms = loadTerms();
                // Check if term already exists
                if (terms.find(t => t.term.toLowerCase() === term.toLowerCase())) {
                    alert('This term already exists!');
                    return;
                }
                terms.push({ term, meaning });
                saveTerms(terms);
                
                termInput.value = '';
                meaningInput.value = '';
                termInput.focus();
                
                renderTerms(searchInput.value);
            }
        });

        searchInput.addEventListener('input', (e) => {
            renderTerms(e.target.value);
        });

        // Initial render
        renderTerms();
    </script>
</body>
</html>
